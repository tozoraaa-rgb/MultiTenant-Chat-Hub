services:
  mysql:
    image: mysql:8.0
    container_name: mth-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: chatbot_db
      MYSQL_USER: chatbot_user
      MYSQL_PASSWORD: chatbot_pass
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD-SHELL', 'mysqladmin ping -h localhost -uroot -proot --silent']
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: apps/backend-service/Dockerfile
    container_name: mth-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 4000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: chatbot_user
      DB_PASSWORD: chatbot_pass
      DB_NAME: chatbot_db
      DB_AUTO_SYNC: 'true'
      DB_AUTO_SEED: 'true'
      DB_CONNECT_RETRY_ATTEMPTS: 20
      DB_CONNECT_RETRY_DELAY_MS: 3000
      JWT_SECRET: replace_with_a_long_random_secret
      JWT_EXPIRES_IN_SECONDS: 3600
      SEED_ADMIN_EMAIL: admin@example.com
      SEED_ADMIN_PASSWORD: ChangeMe123!
      SEED_DEMO_CHATBOT_DOMAIN: shop.example.com
      GEMINI_API_KEY: ${GEMINI_API_KEY:-replace_with_gemini_api_key}
      PUBLIC_RUNTIME_ALLOW_MISSING_ORIGIN: 'true'
      CORS_ALLOWED_ORIGINS: '*'
    ports:
      - '4000:4000'
    healthcheck:
      test: ['CMD', 'node', '-e', "fetch('http://127.0.0.1:4000/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

volumes:
  mysql_data:
