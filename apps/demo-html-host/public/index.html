<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Plain HTML Host Demo</title>
    <style>
      body {
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        margin: 0;
        background: #f8fafc;
        color: #0f172a;
      }
      .page {
        max-width: 760px;
        margin: 0 auto;
        padding: 32px 20px;
      }
      code {
        background: #e2e8f0;
        border-radius: 6px;
        padding: 2px 6px;
      }
    </style>
  </head>
  <body>
    <main class="page">
      <h1>Plain HTML Host Demo</h1>
      <p>
        This demo proves script-tag integration using <code>&lt;chatbot-widget&gt;</code>
        without any React host dependency.
      </p>
      <ul>
        <li>apiBaseUrl: http://localhost:4000</li>
        <li>domain: shop.example.com</li>
        <li>origin expected by backend allowlist: http://localhost:8080</li>
      </ul>
    </main>

    <chatbot-widget
      data-domain="shop.example.com"
      data-api-base-url="http://localhost:4000"
      data-title="HTML Host Widget"
      data-theme="light"
      data-position="bottom-right"
      data-open-by-default="true"
      data-welcome-message="Hello from the plain HTML host demo!"
      data-primary-color="#2563eb"
    ></chatbot-widget>

    <script src="/vendor/chatbot-widget.browser.js"></script>
  </body>
</html>
